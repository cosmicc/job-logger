services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-job_logger}:${POSTGRES_PASSWORD:-job_logger_password}@db:5432/${POSTGRES_DB:-job_logger}
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_INTERNAL_PORT:-8000}
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-development-only-change-me}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH:-}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_SESSION_COOKIE_SECURE: ${APP_SESSION_COOKIE_SECURE:-false}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-localhost,127.0.0.1,app}
      CLOUDFLARE_ACCESS_REQUIRED: ${CLOUDFLARE_ACCESS_REQUIRED:-false}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-mock}
      MAX_AUDIO_UPLOAD_BYTES: ${MAX_AUDIO_UPLOAD_BYTES:-10485760}
      FASTER_WHISPER_MODEL: ${FASTER_WHISPER_MODEL:-base.en}
      FASTER_WHISPER_DEVICE: ${FASTER_WHISPER_DEVICE:-cpu}
      FASTER_WHISPER_COMPUTE_TYPE: ${FASTER_WHISPER_COMPUTE_TYPE:-int8}
      FASTER_WHISPER_DOWNLOAD_ROOT: ${FASTER_WHISPER_DOWNLOAD_ROOT:-/models/faster-whisper}
      FASTER_WHISPER_LOCAL_FILES_ONLY: ${FASTER_WHISPER_LOCAL_FILES_ONLY:-false}
      FASTER_WHISPER_LANGUAGE: ${FASTER_WHISPER_LANGUAGE:-en}
      FASTER_WHISPER_BEAM_SIZE: ${FASTER_WHISPER_BEAM_SIZE:-5}
      AUTOTASK_PROVIDER: ${AUTOTASK_PROVIDER:-mock}
      AUTOTASK_BASE_URL: ${AUTOTASK_BASE_URL:-}
      AUTOTASK_USERNAME: ${AUTOTASK_USERNAME:-}
      AUTOTASK_SECRET: ${AUTOTASK_SECRET:-}
      AUTOTASK_API_INTEGRATION_CODE: ${AUTOTASK_API_INTEGRATION_CODE:-}
      AUTOTASK_RESOURCE_ID: ${AUTOTASK_RESOURCE_ID:-}
      AUTOTASK_ROLE_ID: ${AUTOTASK_ROLE_ID:-}
      AUTOTASK_BILLING_CODE_ID: ${AUTOTASK_BILLING_CODE_ID:-}
      AUTOTASK_TIME_ENTRY_TYPE: ${AUTOTASK_TIME_ENTRY_TYPE:-2}
      AUTOTASK_IMPERSONATION_RESOURCE_ID: ${AUTOTASK_IMPERSONATION_RESOURCE_ID:-}
      AUTOTASK_STATUS_IN_PROGRESS_ID: ${AUTOTASK_STATUS_IN_PROGRESS_ID:-}
      AUTOTASK_STATUS_WAITING_CUSTOMER_ID: ${AUTOTASK_STATUS_WAITING_CUSTOMER_ID:-}
      AUTOTASK_STATUS_WAITING_PARTS_ID: ${AUTOTASK_STATUS_WAITING_PARTS_ID:-}
      AUTOTASK_STATUS_FOLLOW_UP_ID: ${AUTOTASK_STATUS_FOLLOW_UP_ID:-}
      AUTOTASK_STATUS_COMPLETE_ID: ${AUTOTASK_STATUS_COMPLETE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      # The app is intentionally exposed only to the private Compose network.
      # Nginx is the public-facing internal origin for Cloudflare Tunnel.
      - "${APP_INTERNAL_PORT:-8000}"
    volumes:
      - faster_whisper_models:/models/faster-whisper
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.getenv('APP_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health/live', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    environment:
      # NGINX_INTERNAL_PORT is the private Compose-network port that
      # cloudflared should use as the origin service.
      NGINX_INTERNAL_PORT: ${NGINX_INTERNAL_PORT:-8080}
      # APP_UPSTREAM_HOST is the Docker DNS name for the FastAPI service.
      APP_UPSTREAM_HOST: app
      # APP_INTERNAL_PORT must match the app service's APP_PORT value.
      APP_INTERNAL_PORT: ${APP_INTERNAL_PORT:-8000}
      # NGINX_CLIENT_MAX_BODY_SIZE must allow mobile audio upload requests.
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-12m}
    depends_on:
      app:
        condition: service_healthy
    ports:
      # Bind the Nginx troubleshooting port to loopback only. Public access
      # should come through Cloudflare Tunnel and Cloudflare Access.
      - "127.0.0.1:${NGINX_EXPOSE_PORT:-11030}:${NGINX_INTERNAL_PORT:-8080}"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${NGINX_INTERNAL_PORT}/nginx-health\" >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_logger}
      POSTGRES_USER: ${POSTGRES_USER:-job_logger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_logger_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - ${CLOUDFLARED_METRICS:-0.0.0.0:20241}
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN must be set in .env}
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      # The metrics endpoint is for local tunnel diagnostics only.
      - "127.0.0.1:${CLOUDFLARED_METRICS_PORT:-20241}:20241"

volumes:
  postgres_data:
  faster_whisper_models:
