{% extends "base.html" %}

{% block title %}Sign In - Job Logger{% endblock %}

{% block content %}
  <section class="login-shell">
    <div class="login-panel">
      <h1>Sign in</h1>
      <p class="muted-text">Use the local app account configured for this deployment.</p>
      <form method="post" action="/login" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label>
          <span>Username</span>
          <input name="username" autocomplete="username" required>
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button full-width" type="submit">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <path d="M10 17l5-5-5-5"></path>
            <path d="M15 12H3"></path>
          </svg>
          Sign in
        </button>
      </form>
      <div class="passkey-login-panel" data-passkey-login-panel>
        <button class="secondary-button full-width" type="button" data-passkey-login-button>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
            <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
            <path d="M12 15v2"></path>
          </svg>
          Use passkey
        </button>
        <p class="muted-text passkey-status" data-passkey-login-status aria-live="polite"></p>
      </div>
    </div>
  </section>
  <script src="/static/passkeys.js?v={{ static_asset_version }}" defer></script>
{% endblock %}
