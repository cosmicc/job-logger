<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Job Logger">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}Job Logger{% endblock %}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/icons/job-logger-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icons/job-logger-icon-192.png">
    <link rel="stylesheet" href="/static/app.css">
    <link rel="stylesheet" href="/static/phone.css" media="(max-width: 700px)">
    <link rel="stylesheet" href="/static/desktop.css" media="(min-width: 701px)">
    <script src="/static/pwa.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/mobile" aria-label="Job Logger home">
        <span class="brand-mark" aria-hidden="true">JL</span>
        <span>Job Logger</span>
      </a>
      {% if current_username %}
        <div
          class="autotask-api-indicator {% if autotask_api_status.available %}is-available{% else %}is-unavailable{% endif %}"
          role="status"
          aria-live="polite"
          aria-label="Autotask API status {{ autotask_api_status.label }}"
        >
          <span class="autotask-api-dot" aria-hidden="true"></span>
          <span>Autotask API: {{ autotask_api_status.label }}</span>
        </div>
        <nav class="top-nav" aria-label="Primary navigation">
          <a href="/mobile">Mobile</a>
          <a href="/review">Review</a>
          <a href="/debug">Debug</a>
        </nav>
        <form method="post" action="/logout" class="logout-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="icon-button" type="submit" title="Sign out" aria-label="Sign out">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 17l5-5-5-5"></path>
              <path d="M15 12H3"></path>
              <path d="M14 3h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5"></path>
            </svg>
          </button>
        </form>
      {% endif %}
    </header>

    {% if flash_messages %}
      <section class="flash-stack" aria-label="Messages">
        {% for flash_message in flash_messages %}
          <div class="flash flash-{{ flash_message.category }}">{{ flash_message.message }}</div>
        {% endfor %}
      </section>
    {% endif %}

    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
