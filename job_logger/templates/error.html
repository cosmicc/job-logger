{% extends "base.html" %}

{% block title %}{{ error_title }} - Job Logger{% endblock %}

{% block content %}
  <section class="error-shell">
    <div class="error-panel">
      <p class="eyebrow-text">Error {{ error_code }}</p>
      <h1>{{ error_title }}</h1>
      <p class="muted-text">{{ error_message }}</p>
      <div class="error-action-row">
        <a class="primary-button" href="{{ back_link_href }}">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="M12 19l-7-7 7-7"></path>
          </svg>
          {{ back_link_label }}
        </a>
      </div>
    </div>
  </section>
{% endblock %}
