<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Method Not Allowed | Job Logger</title>
    <style>
      :root { color-scheme: dark; --bg: #0b1220; --panel: #111a2c; --text: #e5e9f0; --muted: #94a3b8; --accent: #2dd4bf; --border: rgba(148, 163, 184, 0.28); }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(520px, 100%); padding: 28px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35); }
      .brand { display: inline-flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; font-weight: 800; text-transform: uppercase; }
      .mark { display: inline-grid; width: 34px; height: 34px; place-items: center; border-radius: 8px; background: var(--accent); color: #04120f; font-weight: 900; }
      h1 { margin: 22px 0 10px; font-size: clamp(30px, 6vw, 44px); line-height: 1.05; }
      p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.55; }
      .code { margin-top: 22px; color: var(--accent); font-size: 13px; font-weight: 850; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand"><span class="mark">JL</span><span>Job Logger web service</span></div>
      <h1>Method not allowed</h1>
      <p>This address does not accept the request method that was used.</p>
      <p class="code">Error 405</p>
    </main>
  </body>
</html>
